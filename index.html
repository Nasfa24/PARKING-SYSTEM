<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lebah Parkir - Login Petugas</title>
    <meta name="theme-color" content="#ffb300">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #ffb300; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: 'Poppins', sans-serif; padding: 20px;}
        .container { width: 100%; max-width: 350px; background: #fff; padding: 40px 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .logo { font-size: 55px; margin-bottom: 5px; }
        h1 { margin: 0 0 5px 0; font-size: 24px; color: #222; }
        p { font-size: 13px; color: #666; margin-bottom: 25px; }
        input { width: 100%; padding: 14px; margin-bottom: 15px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px; text-align: center; font-weight: 600; box-sizing: border-box; }
        input:focus { border-color: #ffb300; outline: none; }
        button { width: 100%; padding: 15px; background-color: #333; color: #ffb300; border: none; border-radius: 10px; font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #111; }
        button:disabled { background-color: #888; color: #ccc; cursor: not-allowed; }
        #statusBox { margin-top: 15px; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: 600; display: none; }
        .error { background-color: #ffebee; color: #d32f2f; }
        .success { background-color: #e8f5e9; color: #2e7d32; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">🐝</div>
        <h1>Lebah Parkir</h1>
        <p>Login Petugas Operasional</p>

        <input type="text" id="username" placeholder="Username (misal: mitrasehat)" autocomplete="off" oninput="this.value = this.value.toLowerCase().replace(/\s+/g, '')">
        <input type="password" id="pin" placeholder="PIN Rahasia (4 Angka)" maxlength="4" autocomplete="off" onkeydown="if(event.key === 'Enter') prosesLogin()">
        
        <button id="btnLogin" onclick="prosesLogin()">MASUK SISTEM 🚀</button>
        <div id="statusBox"></div>
    </div>

    <script>
        // API SUPER ADMIN MILIK MAS UUTH
        const MASTER_API = "https://script.google.com/macros/s/AKfycbyb-nr_xGdIbsRvSzX4IAYNm4EqRP_ewIqszUINxWsGCTwGwGfg-TuQB5TJBuh63eE9/exec";

        function prosesLogin() {
            const user = document.getElementById('username').value;
            const pin = document.getElementById('pin').value;
            const btn = document.getElementById('btnLogin');

            if (!user || !pin) { tampilkanPesan('Isi Username dan PIN!', 'error'); return; }

            btn.disabled = true;
            btn.innerText = "MEMVERIFIKASI...";
            document.getElementById('statusBox').style.display = 'none';

            fetch(MASTER_API, {
                method: 'POST',
                redirect: 'follow',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ action: 'login', username: user, pin: pin })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    // Tanam Data dari GSheet Super Admin ke HP Petugas
                    const d = data.data;
                    localStorage.setItem('parkir_apiUrl', d.apiUrl);
                    localStorage.setItem('parkir_tmAwal', d.tmAwal);
                    localStorage.setItem('parkir_tmLanjut', d.tmLanjut);
                    localStorage.setItem('parkir_tbAwal', d.tbAwal);
                    localStorage.setItem('parkir_tbLanjut', d.tbLanjut);
                    localStorage.setItem('parkir_qrisUrl', d.qrisUrl);

                    tampilkanPesan('Berhasil login! Menyiapkan aplikasi...', 'success');
                    btn.innerText = "MEMUAT...";
                    setTimeout(() => { window.location.href = 'masuk.html'; }, 1000);
                } else {
                    tampilkanPesan(data.message, 'error');
                    btn.disabled = false;
                    btn.innerText = "MASUK SISTEM 🚀";
                }
            })
            .catch(err => {
                tampilkanPesan('Gagal terhubung ke server utama.', 'error');
                btn.disabled = false;
                btn.innerText = "MASUK SISTEM 🚀";
            });
        }

        function tampilkanPesan(pesan, tipe) {
            const box = document.getElementById('statusBox');
            box.innerText = pesan; box.className = tipe; box.style.display = 'block';
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>
</body>
</html>
