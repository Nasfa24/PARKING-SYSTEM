<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktivasi Lebah Parkir</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #ffb300; color: #333; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Poppins', sans-serif; text-align: center; padding: 20px; }
        .container { background: white; padding: 40px 20px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        
        .logo { font-size: 50px; margin-bottom: 10px; }
        h2 { margin-top: 0; margin-bottom: 5px; font-size: 22px; color: #333; }
        p { font-size: 13px; color: #666; margin-bottom: 25px; }

        /* Area PIN */
        #pinArea { display: block; }
        input[type="password"] { width: 100%; padding: 15px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 24px; text-align: center; letter-spacing: 10px; font-weight: bold; margin-bottom: 15px; transition: 0.3s;}
        input[type="password"]:focus { border-color: #ffb300; outline: none; }
        button { width: 100%; padding: 15px; background-color: #333; color: #ffb300; border: none; border-radius: 10px; font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #111; }
        #errorMsg { color: #d32f2f; font-size: 13px; font-weight: 600; margin-top: 10px; display: none; }

        /* Area Loading (Sembunyi dulu) */
        #loadingArea { display: none; }
        .loader { border: 5px solid #f3f3f3; border-top: 5px solid #ffb300; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">🐝</div>
        
        <div id="pinArea">
            <h2>Aktivasi Sistem</h2>
            <p>Lembaga 1 - Masukkan PIN Petugas</p>
            <input type="password" id="inputPin" placeholder="••••" maxlength="4" autocomplete="off">
            <button onclick="cekPin()">BUKA KUNCI 🔓</button>
            <div id="errorMsg">❌ PIN Salah! Silakan coba lagi.</div>
        </div>

        <div id="loadingArea">
            <div class="loader"></div>
            <h2>Mengonfigurasi...</h2>
            <p>Menyiapkan database aman Anda.</p>
        </div>
    </div>

    <script>
        // --- PENGATURAN KLIEN (LEMBAGA 1) ---
        const PIN_RAHASIA = "1234"; // Ganti dengan PIN yang kamu inginkan untuk lembaga ini
        const API_URL = "URL_API_LEMBAGA_1_DISINI";
        const TARIF_AWAL = "2000";
        const TARIF_LANJUT = "1000";
        const QRIS_URL = "URL_QRIS_LEMBAGA_1_DISINI";
        // ------------------------------------

        function cekPin() {
            const input = document.getElementById('inputPin').value;
            const errorMsg = document.getElementById('errorMsg');

            if (input === PIN_RAHASIA) {
                // PIN Benar!
                errorMsg.style.display = 'none';
                document.getElementById('pinArea').style.display = 'none';
                document.getElementById('loadingArea').style.display = 'block';

                // Tanamkan data ke HP Petugas
                localStorage.setItem('parkir_apiUrl', API_URL);
                localStorage.setItem('parkir_tarifAwal', TARIF_AWAL);
                localStorage.setItem('parkir_tarifLanjut', TARIF_LANJUT);
                localStorage.setItem('parkir_qrisUrl', QRIS_URL);

                // Lempar ke aplikasi kasir
                setTimeout(() => {
                    window.location.href = '../masuk.html';
                }, 1500); 

            } else {
                // PIN Salah
                errorMsg.style.display = 'block';
                document.getElementById('inputPin').value = '';
            }
        }
    </script>
</body>
</html>
