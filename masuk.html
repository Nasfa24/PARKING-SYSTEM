<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parkir - Kendaraan Masuk</title>
    <meta name="theme-color" content="#03754c">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #03754c;
            --primary-hover: #025939;
            --bg-color: #fefefe;
            --text-dark: #333333;
            --border: #e0e0e0;
        }

        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-dark); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 400px; background: #fff; padding: 30px 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid var(--border); }
        
        /* UI TAB NAVIGASI BARU */
        .tab-menu { display: flex; gap: 5px; background: #f4f7f6; border-radius: 12px; margin-bottom: 25px; padding: 5px; border: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 12px; text-align: center; text-decoration: none; font-weight: 700; font-size: 15px; color: #666; border-radius: 8px; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(3, 117, 76, 0.2); pointer-events: none;}
        .tab-btn:not(.active):hover { background: #e8e8e8; }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
        input[type="text"] { width: 100%; padding: 14px; border: 2px solid var(--border); border-radius: 8px; font-size: 18px; transition: border-color 0.3s; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; text-align: center;}
        input[type="text"]:focus { border-color: var(--primary); outline: none; }
        
        .radio-group { display: flex; gap: 10px; }
        .radio-label { flex: 1; background: #f4f7f6; padding: 12px; border-radius: 8px; text-align: center; border: 2px solid var(--border); cursor: pointer; font-weight: 600; transition: 0.3s;}
        .radio-label:has(input:checked) { background: #e8f5e9; border-color: var(--primary); color: var(--primary); }
        .radio-label input { display: none; }

        input[type="file"] { display: none; }
        .btn-kamera { display: block; width: 100%; padding: 12px; background-color: #e0f2f1; color: var(--primary); border: 2px dashed var(--primary); border-radius: 8px; text-align: center; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-kamera:hover { background-color: #b2dfdb; }
        #previewFoto { width: 100%; margin-top: 10px; border-radius: 8px; display: none; border: 1px solid var(--border); }

        button { width: 100%; padding: 15px; background-color: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: var(--primary-hover); }
        button:disabled { background-color: #9e9e9e; cursor: not-allowed; }

        /* UI TOMBOL LOGOUT BARU */
        .btn-logout { display: block; width: 100%; text-align: center; padding: 14px; margin-top: 25px; border: 2px solid #ffcdd2; color: #d32f2f; border-radius: 8px; font-weight: 700; text-decoration: none; background: #fff; transition: 0.3s; }
        .btn-logout:hover { background: #ffebee; border-color: #ef5350; }

        #statusBox { margin-top: 15px; padding: 12px; border-radius: 8px; text-align: center; font-size: 14px; font-weight: 600; display: none; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .loading { background-color: #e2e3e5; color: #383d41; border: 1px solid #d6d8db; }
    </style>
</head>
<body>

    <div class="container">
        <div class="tab-menu">
            <a href="masuk.html" class="tab-btn active">🚗 MASUK</a>
            <a href="keluar.html" class="tab-btn">🏁 KELUAR</a>
        </div>

        <div class="form-group">
            <label for="platNomor">Plat Nomor Kendaraan:</label>
            <input type="text" id="platNomor" placeholder="CONTOH: L1234XX" autocomplete="off" oninput="this.value = this.value.toUpperCase().replace(/\s+/g, '')">
        </div>

        <div class="form-group">
            <label>Jenis Kendaraan:</label>
            <div class="radio-group">
                <label class="radio-label">
                    <input type="radio" name="jenisK" value="Motor" checked> 🏍️ Motor
                </label>
                <label class="radio-label">
                    <input type="radio" name="jenisK" value="Mobil"> 🚗 Mobil
                </label>
            </div>
        </div>

        <div class="form-group">
            <label>Foto Bukti Masuk <span style="color:red;">*</span>:</label>
            <label for="kameraMasuk" class="btn-kamera">📷 Ambil Foto Kendaraan</label>
            <input type="file" accept="image/*" capture="environment" id="kameraMasuk" onchange="kompresGambar(event)">
            <img id="previewFoto" alt="Preview Foto">
        </div>

        <button id="btnMasuk" onclick="prosesMasuk()">SIMPAN DATA MASUK</button>

        <div id="statusBox"></div>

        <a href="#" onclick="logout()" class="btn-logout">🚪 Keluar Akun</a>
    </div>

    <script>
        let fotoBase64 = "";

        window.onload = function() {
            if (!localStorage.getItem('parkir_apiUrl')) {
                window.location.href = 'index.html';
            }
        };

        function kompresGambar(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = function(e) {
                const img = new Image();
                img.src = e.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 600; 
                    const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scaleSize;

                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                    fotoBase64 = canvas.toDataURL('image/jpeg', 0.6);
                    
                    const preview = document.getElementById('previewFoto');
                    preview.src = fotoBase64;
                    preview.style.display = 'block';
                }
            }
        }

        function prosesMasuk() {
            const apiUrl = localStorage.getItem('parkir_apiUrl');
            const platNomor = document.getElementById('platNomor').value.replace(/\s+/g, '').toUpperCase();
            const jenisKendaraan = document.querySelector('input[name="jenisK"]:checked').value;
            const btnMasuk = document.getElementById('btnMasuk');

            if (!platNomor) { tampilkanStatus('❌ Plat nomor tidak boleh kosong!', 'error'); return; }
            if (!fotoBase64 || fotoBase64 === "") { tampilkanStatus('❌ FOTO WAJIB DIAMBIL sebelum menyimpan!', 'error'); return; }

            btnMasuk.disabled = true;
            btnMasuk.innerText = "MENYIMPAN...";
            tampilkanStatus('Mengirim data dan mengupload foto...', 'loading');

            const waktuSekarang = new Date().toLocaleString('id-ID');
            
            const payload = {
                action: 'masuk',
                platNomor: platNomor,
                jenis: jenisKendaraan,
                waktuMasuk: waktuSekarang,
                fotoMasuk: fotoBase64 
            };

            fetch(apiUrl, {
                method: 'POST',
                redirect: 'follow', 
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    document.getElementById('platNomor').value = '';
                    document.getElementById('previewFoto').style.display = 'none';
                    fotoBase64 = ""; 
                    tampilkanStatus(`✅ Berhasil! Plat ${data.data.platNomor} masuk.`, 'success');
                } else {
                    tampilkanStatus(`❌ Gagal: ${data.message}`, 'error');
                }
            })
            .catch(error => {
                tampilkanStatus('❌ Terjadi kesalahan jaringan. Cek koneksi internet.', 'error');
            })
            .finally(() => {
                btnMasuk.disabled = false;
                btnMasuk.innerText = "SIMPAN DATA MASUK";
            });
        }

        function tampilkanStatus(pesan, tipe) {
            const box = document.getElementById('statusBox');
            box.innerText = pesan; box.className = tipe; box.style.display = 'block';
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
