<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parkir - Kendaraan Keluar</title>
    <meta name="theme-color" content="#03754c">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        :root {
            --primary: #03754c;
            --primary-hover: #025939;
            --bg-color: #fefefe;
            --text-dark: #333333;
            --border: #e0e0e0;
        }

        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-dark); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 400px; background: #fff; padding: 30px 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid var(--border); }
        h2 { text-align: center; color: var(--primary); margin-top: 0; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
        input[type="text"] { width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 8px; font-size: 16px; text-transform: uppercase; font-weight: bold; letter-spacing: 1px;}
        input[type="text"]:focus { border-color: var(--primary); outline: none; }
        
        button { width: 100%; padding: 14px; background-color: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-bottom: 10px;}
        button:hover { background-color: var(--primary-hover); }
        button:disabled { background-color: #9e9e9e; cursor: not-allowed; }
        
        .btn-secondary { background-color: #f44336; }
        .btn-secondary:hover { background-color: #d32f2f; }
        .btn-scan { background-color: #ff9800; }
        .btn-scan:hover { background-color: #f57c00; }

        .btn-info { background-color: #00acc1; color: white; display: block; text-align: center; padding: 12px; border-radius: 8px; text-decoration: none; font-size: 14px; margin-bottom: 15px; font-weight: 600; transition: 0.3s; border: 2px solid #00838f;}
        .btn-info:hover { background-color: #00838f; }

        input[type="file"] { display: none; }
        .btn-kamera { display: block; width: 100%; padding: 12px; background-color: #e0f2f1; color: var(--primary); border: 2px dashed var(--primary); border-radius: 8px; text-align: center; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 15px; margin-bottom: 5px;}
        .btn-kamera:hover { background-color: #b2dfdb; }
        
        .preview-box { width: 100%; margin-top: 5px; margin-bottom: 15px; border-radius: 8px; border: 1px solid var(--border); display: none; }
        .foto-label { font-size: 12px; font-weight: 600; color: #555; text-align: center; margin-bottom: 5px; display: none;}

        #ringkasanTagihan { display: none; background-color: #e8f5e9; padding: 15px; border-radius: 8px; border: 1px solid #c8e6c9; margin-bottom: 20px; }
        .tagihan-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .tagihan-total { display: flex; justify-content: space-between; font-weight: 700; font-size: 18px; color: var(--primary); margin-top: 10px; padding-top: 10px; border-top: 2px dashed #a5d6a7; margin-bottom: 15px;}

        .payment-options { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 15px; }
        .payment-btn { flex: 1; padding: 10px; border: 2px solid var(--border); border-radius: 8px; background: white; cursor: pointer; font-weight: 600; transition: 0.2s; color: var(--text-dark); }
        .payment-btn.active { border-color: var(--primary); background-color: #e8f5e9; color: var(--primary); }
        
        #qrisArea { display: none; text-align: center; margin-bottom: 15px; padding-top: 10px; border-top: 1px solid #c8e6c9;}
        #qrisImage { max-width: 200px; width: 100%; border-radius: 8px; margin-top: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);}

        #scannerArea { display: none; width: 100%; margin-bottom: 15px; border-radius: 8px; overflow: hidden; border: 2px solid var(--primary); }

        #terimaKasihArea { display: none; text-align: center; padding: 30px 10px; }
        .tk-icon { font-size: 60px; margin-bottom: 10px; }
        .tk-text { font-size: 20px; font-weight: 700; color: var(--primary); margin-bottom: 5px; }
        .tk-sub { font-size: 14px; color: #666; }

        #statusBox { margin-top: 15px; padding: 12px; border-radius: 8px; text-align: center; font-size: 14px; font-weight: 600; display: none; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .loading { background-color: #e2e3e5; color: #383d41; border: 1px solid #d6d8db; }

        .nav-menu { display: flex; justify-content: space-between; margin-top: 25px; padding-top: 15px; border-top: 1px solid var(--border); }
        .nav-menu a { color: var(--primary); text-decoration: none; font-size: 13px; font-weight: 600; }
        .nav-menu a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="container">
        <div id="headerNormal">
            <h2>Catat Keluar 🏁</h2>
        </div>

        <div id="terimaKasihArea">
            <div class="tk-icon">🙏</div>
            <div class="tk-text">Terima Kasih!</div>
            <div class="tk-sub">Pembayaran berhasil. Hati-hati di jalan.</div>
        </div>

        <div id="areaPencarian">
            <div class="form-group">
                <label>Pilih Cara Cari Kendaraan:</label>
                
                <div id="scannerArea"></div>
                <button id="btnMulaiScan" class="btn-scan" onclick="mulaiScanner()">📱 SCAN KARCIS PENGENDARA</button>
                
                <div style="text-align: center; margin: 15px 0; font-size: 12px; color: #888; font-weight: 600;">ATAU KETIK MANUAL</div>

                <input type="text" id="platNomor" placeholder="CONTOH: L1234XX" autocomplete="off" oninput="this.value = this.value.toUpperCase().replace(/\s+/g, '')">
                <button id="btnCari" onclick="cariKendaraan()" style="margin-top: 10px;">🔍 CARI PLAT NOMOR</button>
            </div>
        </div>

        <div id="ringkasanTagihan">
            <div id="wadahFotoMasuk">
                <p class="foto-label" id="labelFotoMasuk">📷 Bukti Foto Masuk:</p>
                <img id="previewFotoMasuk" class="preview-box" alt="Memuat Foto..." onerror="gagalMuatFoto()">
                <a id="btnLihatFotoMasuk" href="#" target="_blank" class="btn-info" style="display: none;">🔍 Buka Bukti Foto Masuk</a>
            </div>

            <div class="tagihan-item"><span>Waktu Masuk:</span> <span id="lblMasuk">-</span></div>
            <div class="tagihan-item"><span>Waktu Keluar:</span> <span id="lblKeluar">-</span></div>
            <div class="tagihan-item"><span>Durasi Parkir:</span> <span id="lblDurasi">-</span></div>
            <div class="tagihan-total"><span>Total Biaya:</span> <span id="lblBiaya">Rp 0</span></div>
            
            <label style="margin-top: 15px;">Metode Pembayaran:</label>
            <div class="payment-options">
                <button type="button" id="btnCash" class="payment-btn active" onclick="pilihPembayaran('CASH')">💵 CASH</button>
                <button type="button" id="btnQris" class="payment-btn" onclick="pilihPembayaran('QRIS')">📱 QRIS</button>
            </div>
            
            <div id="qrisArea">
                <span style="font-size: 12px; font-weight: 600; color: #555;">Silakan Scan QRIS di bawah ini:</span><br>
                <img id="qrisImage" src="" alt="QRIS Petugas">
            </div>

            <label for="kameraKeluar" class="btn-kamera">📷 Ambil Foto Keluar <span style="color:red;">*</span></label>
            <input type="file" accept="image/*" capture="environment" id="kameraKeluar" onchange="kompresGambar(event)">
            <img id="previewFotoKeluar" class="preview-box" alt="Preview Foto Keluar">

            <button id="btnSelesaikan" onclick="selesaikanParkir()">SELESAIKAN & BAYAR</button>
            <button class="btn-secondary" onclick="resetForm()">BATAL</button>
        </div>

        <div id="statusBox"></div>

        <div class="nav-menu" id="navBawah">
            <a href="masuk.html">⬅️ Catat Masuk</a>
            <a href="pengaturan.html">⚙️ Pengaturan</a>
        </div>
    </div>

    <script>
        let dataTransaksi = {};
        let fotoKeluarBase64 = "";
        let globalUrlFotoMasuk = ""; 
        let metodePembayaran = "CASH"; 
        let html5QrCode; 

        function mulaiScanner() {
            const scannerArea = document.getElementById('scannerArea');
            const btnMulaiScan = document.getElementById('btnMulaiScan');
            
            scannerArea.style.display = 'block';
            btnMulaiScan.style.display = 'none';

            html5QrCode = new Html5Qrcode("scannerArea");
            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: { width: 250, height: 250 } },
                (decodedText, decodedResult) => {
                    tutupScanner();
                    document.getElementById('platNomor').value = decodedText;
                    tampilkanStatus("✅ Karcis terdeteksi!", "success");
                    setTimeout(() => { cariKendaraan(); }, 500); 
                },
                (errorMessage) => {
                }
            ).catch((err) => {
                tampilkanStatus('❌ Kamera diblokir. Izinkan akses kamera di browser Anda.', 'error');
                tutupScanner();
            });
        }

        function tutupScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('scannerArea').style.display = 'none';
                    document.getElementById('btnMulaiScan').style.display = 'block';
                }).catch(err => console.log(err));
            }
        }

        function pilihPembayaran(metode) {
            metodePembayaran = metode;
            const btnCash = document.getElementById('btnCash');
            const btnQris = document.getElementById('btnQris');
            const qrisArea = document.getElementById('qrisArea');
            const qrisUrl = localStorage.getItem('parkir_qrisUrl');

            if (metode === 'CASH') {
                btnCash.classList.add('active');
                btnQris.classList.remove('active');
                qrisArea.style.display = 'none';
            } else {
                btnQris.classList.add('active');
                btnCash.classList.remove('active');
                
                if (qrisUrl && qrisUrl !== "") {
                    let finalQrisUrl = qrisUrl;
                    if (qrisUrl.includes('drive.google.com')) {
                        let fileId = "";
                        const matchD = qrisUrl.match(/\/d\/(.+?)\//);
                        const matchId = qrisUrl.match(/id=([^&]+)/);
                        if (matchD && matchD[1]) fileId = matchD[1];
                        else if (matchId && matchId[1]) fileId = matchId[1];

                        if (fileId) {
                            finalQrisUrl = `https://drive.google.com/thumbnail?id=${fileId}&sz=w800`;
                        }
                    }
                    document.getElementById('qrisImage').src = finalQrisUrl;
                    qrisArea.style.display = 'block';
                } else {
                    tampilkanStatus('⚠️ Anda belum mengatur Link QRIS di menu Pengaturan.', 'error');
                }
            }
        }

        function kompresGambar(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = function(e) {
                const img = new Image();
                img.src = e.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 600;
                    const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scaleSize;

                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                    fotoKeluarBase64 = canvas.toDataURL('image/jpeg', 0.6);
                    const preview = document.getElementById('previewFotoKeluar');
                    preview.src = fotoKeluarBase64;
                    preview.style.display = 'block';
                }
            }
        }

        function cariKendaraan() {
            const apiUrl = localStorage.getItem('parkir_apiUrl');
            const platNomor = document.getElementById('platNomor').value.replace(/\s+/g, '').toUpperCase();
            
            if (!apiUrl) {
                tampilkanStatus('❌ URL API belum diatur! Silakan ke menu Pengaturan.', 'error');
                return;
            }
            if (!platNomor) {
                tampilkanStatus('Plat Nomor wajib diisi!', 'error');
                return;
            }

            document.getElementById('btnCari').disabled = true;
            tampilkanStatus('Mencari data kendaraan...', 'loading');

            fetch(apiUrl, {
                method: 'POST',
                redirect: 'follow',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ action: 'cari', platNomor: platNomor })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    hitungTarif(data.data.waktuMasuk, platNomor, data.data.fotoMasuk);
                } else {
                    tampilkanStatus(`❌ ${data.message}`, 'error');
                    document.getElementById('btnCari').disabled = false;
                }
            })
            .catch(err => {
                tampilkanStatus('❌ Terjadi kesalahan jaringan.', 'error');
                document.getElementById('btnCari').disabled = false;
            });
        }

        function parseWaktuLokal(waktuStr) {
            try {
                let parts = waktuStr.split(', ');
                let datePart = parts[0].split('/');
                let timePart = parts[1].split('.');
                if (timePart.length < 3) timePart = parts[1].split(':'); 

                let day = parseInt(datePart[0]);
                let month = parseInt(datePart[1]) - 1; 
                let year = parseInt(datePart[2]);
                let hour = parseInt(timePart[0]);
                let minute = parseInt(timePart[1]);
                let second = parseInt(timePart[2]);

                return new Date(year, month, day, hour, minute, second);
            } catch (e) {
                return new Date(); 
            }
        }

        function hitungTarif(waktuMasukStr, platNomor, urlFotoMasuk) {
            const tarifPertama = parseInt(localStorage.getItem('parkir_tarifAwal')) || 2000;
            const tarifBerikutnya = parseInt(localStorage.getItem('parkir_tarifLanjut')) || 1000;

            const waktuKeluar = new Date(); 
            const waktuKeluarStr = waktuKeluar.toLocaleString('id-ID'); 
            
            const waktuMasukObj = parseWaktuLokal(waktuMasukStr);
            let selisihMs = waktuKeluar - waktuMasukObj;
            let durasiMenit = Math.floor(selisihMs / (1000 * 60));
            if (durasiMenit <= 0) durasiMenit = 1; 

            let durasiJam = Math.ceil(durasiMenit / 60);
            let totalBiaya = tarifPertama;
            if (durasiJam > 1) {
                totalBiaya += (durasiJam - 1) * tarifBerikutnya;
            }

            dataTransaksi = {
                platNomor: platNomor,
                waktuKeluar: waktuKeluarStr,
                durasi: `${durasiMenit} Menit`,
                biaya: `Rp ${totalBiaya}`
            };

            globalUrlFotoMasuk = urlFotoMasuk;
            const previewFotoMasuk = document.getElementById('previewFotoMasuk');
            const labelFotoMasuk = document.getElementById('labelFotoMasuk');
            const btnLihatFoto = document.getElementById('btnLihatFotoMasuk');
            btnLihatFoto.style.display = 'none';

            if (urlFotoMasuk && urlFotoMasuk !== "") {
                let fileId = "";
                const matchD = urlFotoMasuk.match(/\/d\/(.+?)\//);
                const matchId = urlFotoMasuk.match(/id=([^&]+)/);
                
                if (matchD && matchD[1]) fileId = matchD[1];
                else if (matchId && matchId[1]) fileId = matchId[1];

                if (fileId) {
                    previewFotoMasuk.src = `https://drive.google.com/thumbnail?id=${fileId}&sz=w600`;
                } else {
                    previewFotoMasuk.src = urlFotoMasuk; 
                }
                previewFotoMasuk.style.display = 'block';
                labelFotoMasuk.style.display = 'block';
            } else {
                previewFotoMasuk.style.display = 'none';
                labelFotoMasuk.style.display = 'none';
            }

            document.getElementById('lblMasuk').innerText = waktuMasukStr;
            document.getElementById('lblKeluar').innerText = waktuKeluarStr;
            document.getElementById('lblDurasi').innerText = dataTransaksi.durasi;
            document.getElementById('lblBiaya').innerText = dataTransaksi.biaya;

            pilihPembayaran('CASH');

            document.getElementById('areaPencarian').style.display = 'none';
            document.getElementById('ringkasanTagihan').style.display = 'block';
            tampilkanStatus('✅ Ditemukan. Validasi foto, tagih, & ambil bukti keluar.', 'success');
        }

        function gagalMuatFoto() {
            document.getElementById('previewFotoMasuk').style.display = 'none';
            document.getElementById('labelFotoMasuk').style.display = 'none';
            const btnLihatFoto = document.getElementById('btnLihatFotoMasuk');
            if (globalUrlFotoMasuk && globalUrlFotoMasuk !== "") {
                btnLihatFoto.href = globalUrlFotoMasuk;
                btnLihatFoto.style.display = 'block';
            }
        }

        function selesaikanParkir() {
            const apiUrl = localStorage.getItem('parkir_apiUrl');
            const btnSelesai = document.getElementById('btnSelesaikan');
            
            if (!fotoKeluarBase64 || fotoKeluarBase64 === "") {
                tampilkanStatus('❌ FOTO BUKTI KELUAR WAJIB DIAMBIL sebelum menyelesaikan!', 'error');
                return;
            }

            btnSelesai.disabled = true;
            tampilkanStatus('Menyelesaikan parkir & Upload Foto...', 'loading');

            const payload = {
                action: 'keluar',
                platNomor: dataTransaksi.platNomor,
                waktuKeluar: dataTransaksi.waktuKeluar,
                durasi: dataTransaksi.durasi,
                biaya: dataTransaksi.biaya,
                metodePembayaran: metodePembayaran,
                fotoKeluar: fotoKeluarBase64 
            };

            fetch(apiUrl, {
                method: 'POST',
                redirect: 'follow',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    document.getElementById('ringkasanTagihan').style.display = 'none';
                    document.getElementById('headerNormal').style.display = 'none';
                    document.getElementById('navBawah').style.display = 'none';
                    document.getElementById('statusBox').style.display = 'none';
                    
                    document.getElementById('terimaKasihArea').style.display = 'block';
                    
                    setTimeout(() => resetForm(), 4000); 
                } else {
                    tampilkanStatus(`❌ Gagal: ${data.message}`, 'error');
                    btnSelesai.disabled = false;
                }
            })
            .catch(err => {
                tampilkanStatus('❌ Kesalahan jaringan. Cek koneksi internet.', 'error');
                btnSelesai.disabled = false;
            });
        }

        function resetForm() {
            tutupScanner();

            document.getElementById('terimaKasihArea').style.display = 'none';
            document.getElementById('headerNormal').style.display = 'block';
            document.getElementById('navBawah').style.display = 'flex';
            
            document.getElementById('platNomor').value = '';
            document.getElementById('areaPencarian').style.display = 'block';
            document.getElementById('ringkasanTagihan').style.display = 'none';
            document.getElementById('btnCari').disabled = false;
            document.getElementById('btnSelesaikan').disabled = false;
            document.getElementById('statusBox').style.display = 'none';
            
            document.getElementById('previewFotoKeluar').style.display = 'none';
            document.getElementById('previewFotoMasuk').style.display = 'none';
            document.getElementById('labelFotoMasuk').style.display = 'none';
            document.getElementById('btnLihatFotoMasuk').style.display = 'none';
            document.getElementById('qrisArea').style.display = 'none';
            
            dataTransaksi = {};
            fotoKeluarBase64 = "";
            globalUrlFotoMasuk = "";
            metodePembayaran = "CASH";
        }

        function tampilkanStatus(pesan, tipe) {
            const box = document.getElementById('statusBox');
            box.innerText = pesan;
            box.className = tipe;
            box.style.display = 'block';
        }

        // Pendaftaran Service Worker PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => console.log('SW terdaftar'))
                    .catch(err => console.log('SW gagal', err));
            });
        }
    </script>
</body>
</html>
